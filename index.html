<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate AI News Studio</title>
    <style>
        :root { --primary: #00d2ff; --bg: #050a10; }
        body { margin: 0; background: var(--bg); font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; height: 100vh; }

        /* UI Panel */
        #ui { position: fixed; inset: 0; z-index: 1000; background: #0a141e; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .hide-ui { transform: translateY(-100%); opacity: 0; pointer-events: none; }
        .box { width: 90%; max-width: 450px; display: flex; flex-direction: column; gap: 15px; }
        textarea { width: 100%; height: 200px; background: #111; color: #00ffcc; border: 1px solid var(--primary); padding: 12px; border-radius: 8px; font-size: 16px; box-sizing: border-box; resize: none; }
        button { padding: 15px; background: var(--primary); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* Studio Area */
        #studio { width: 100vw; height: 100vh; background: #000 url('https://images.unsplash.com/photo-1495020689067-958852a7765e?auto=format&fit=crop&q=80&w=2070') center/cover; display: flex; align-items: center; justify-content: center; }
        #screen { width: 95%; height: 85%; border: 3px solid var(--primary); border-radius: 20px; background: rgba(0,0,0,0.6); overflow: hidden; position: relative; box-shadow: 0 0 30px rgba(0,210,255,0.3); }

        /* News Animation */
        #news-container { position: absolute; top: 40%; width: 100%; height: 120px; overflow: hidden; display: flex; align-items: center; }
        
        /* .news-item ক্লাসটি ডাইনামিক্যালি তৈরি হবে */
        .news-item {
            position: absolute;
            white-space: nowrap;
            font-size: clamp(30px, 8vw, 55px);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px rgba(0,210,255,0.8), 2px 2px 5px #000;
            left: 100%;
            will-change: transform;
        }

        @keyframes march {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-110% - 100vw)); }
        }

        /* Bottom Ticker */
        #bar { position: absolute; bottom: 0; width: 100%; height: 55px; background: linear-gradient(to right, #900, #f00); border-top: 2px solid #fff; display: flex; align-items: center; }
        #edit { position: fixed; bottom: 75px; right: 25px; background: var(--primary); width: 55px; height: 55px; border-radius: 50%; border: none; font-weight: bold; z-index: 1001; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="ui">
    <div class="box">
        <h2 style="text-align:center; margin-bottom: 5px;">PRO NEWS STUDIO 2026</h2>
        <p style="text-align:center; font-size: 12px; color: #aaa;">প্রতি লাইনে একটি করে খবর দিন (আনলিমিটেড)</p>
        <textarea id="inputText" placeholder="১ম সংবাদ লিখে Enter দিন...&#10;২য় সংবাদ...&#10;৩য় সংবাদ..."></textarea>
        <button onclick="startBroadcasting()">▶ লাইভ ব্রডকাস্টিং শুরু করুন</button>
    </div>
</div>

<button id="edit" onclick="resetStudio()">EDIT</button>

<div id="studio">
    <div id="screen">
        <div id="news-container"></div> <div id="bar">
            <div style="background:#fff; color:#000; padding:0 20px; height:100%; display:flex; align-items:center; font-weight:900;">ব্রেকিং</div>
            <marquee id="bottom-marquee" style="color:#fff; font-weight:bold; font-size: 20px;">সত্যের সন্ধানে আমরা অবিচল...</marquee>
        </div>
    </div>
</div>

<script>
    let newsQueue = [];
    let currentIdx = 0;
    const synth = window.speechSynthesis;
    let isRunning = false;

    function startBroadcasting() {
        const text = document.getElementById('inputText').value.trim();
        if (!text) return alert("নিউজ ইনপুট দিন!");

        newsQueue = text.split('\n').filter(line => line.trim() !== "");
        currentIdx = 0;
        isRunning = true;
        document.getElementById('ui').classList.add('hide-ui');
        playNextNews();
    }

    function resetStudio() {
        isRunning = false;
        synth.cancel();
        document.getElementById('ui').classList.remove('hide-ui');
        document.getElementById('news-container').innerHTML = '';
    }

    function playNextNews() {
        if (!isRunning) return;

        // যদি সব নিউজ শেষ হয়ে যায়, আবার ১ নম্বর থেকে শুরু হবে
        if (currentIdx >= newsQueue.length) {
            currentIdx = 0;
        }

        const container = document.getElementById('news-container');
        container.innerHTML = ''; // আগের নিউজ পুরোপুরি মুছে ফেলা (মেমোরি সেভ)

        const newsText = newsQueue[currentIdx];
        const newsElement = document.createElement('div');
        newsElement.className = 'news-item';
        newsElement.innerText = newsText;
        container.appendChild(newsElement);

        // গতি ক্যালকুলেশন: স্ক্রিন সাইজ এবং টেক্সট লেন্থ অনুযায়ী
        const duration = (newsText.length * 0.15) + 6; 
        newsElement.style.animation = `march ${duration}s linear forwards`;

        // ভয়েস ইঞ্জিন
        const utterance = new SpeechSynthesisUtterance(newsText);
        utterance.lang = 'bn-BD';
        utterance.rate = 0.85;
        synth.speak(utterance);

        // পরের লাইনের টাইমিং (অ্যানিমেশন শেষ হওয়ার সামান্য আগে শুরু হবে যাতে গ্যাপ না থাকে)
        setTimeout(() => {
            if (isRunning) {
                currentIdx++;
                playNextNews();
            }
        }, duration * 1000); 
    }

    // মোবাইল ব্রাউজার সাপোর্ট ফিক্স
    window.speechSynthesis.onvoiceschanged = () => synth.getVoices();
</script>

</body>
</html>
