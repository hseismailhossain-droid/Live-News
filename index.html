<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate News Studio V5 - Final</title>
    <style>
        :root { --primary: #ff0000; --bg: #050a10; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; }

        /* Setup UI */
        #ui { position: fixed; inset: 0; z-index: 5000; background: radial-gradient(circle, #1a2a3a, #000); display: flex; align-items: center; justify-content: center; transition: 0.8s; }
        .hide-ui { opacity: 0; pointer-events: none; transform: scale(1.1); }
        .setup-card { width: 90%; max-width: 600px; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 2px solid var(--primary); backdrop-filter: blur(20px); }
        
        textarea { width: 100%; height: 120px; background: #000; border: 1px solid #444; color: #00f2ff; padding: 12px; border-radius: 8px; font-size: 15px; margin-bottom: 15px; resize: none; outline: none; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        select, input { padding: 12px; background: #111; color: #fff; border: 1px solid #444; border-radius: 8px; }
        label { font-size: 12px; color: #aaa; margin-bottom: 5px; display: block; }
        
        .start-btn { width: 100%; padding: 18px; background: var(--primary); border: none; border-radius: 10px; font-weight: 900; font-size: 20px; cursor: pointer; color: white; text-transform: uppercase; }

        /* Countdown */
        #countdown { position: fixed; inset: 0; z-index: 4000; background: #000; display: none; align-items: center; justify-content: center; font-size: 180px; font-weight: 900; color: var(--primary); text-shadow: 0 0 50px var(--primary); }

        /* Main Studio */
        #studio { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: url('https://www.image2url.com/r2/default/images/1776696418736-0708cc91-2660-48cf-9094-e01f6edc43e4.png') center/cover; }
        #studio::before { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.6); z-index: 0; }

        header { position: absolute; top: 0; width: 100%; padding: 25px 50px; display: flex; justify-content: space-between; align-items: center; z-index: 10; box-sizing: border-box; }
        .logo-box { border-left: 8px solid var(--primary); padding-left: 15px; }
        .logo-box h1 { margin: 0; font-size: 35px; letter-spacing: 2px; }
        #clock-box { text-align: right; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); }

        /* News Display Area */
        #display-area { flex: 1; z-index: 5; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 100px; }
        #news-image-container { width: 500px; height: 300px; margin-bottom: 30px; border: 5px solid #fff; border-radius: 15px; overflow: hidden; display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.8); transform: translateY(20px); opacity: 0; transition: 0.8s; }
        #news-image-container.show { display: block; transform: translateY(0); opacity: 1; }
        #news-image-container img { width: 100%; height: 100%; object-fit: cover; }

        #news-card { width: 85%; max-width: 1100px; background: rgba(0,0,0,0.85); padding: 50px; border-radius: 0 50px 0 50px; border-bottom: 6px solid var(--primary); backdrop-filter: blur(15px); opacity: 0; transform: scale(0.9); transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-align: center; }
        #news-card.active { opacity: 1; transform: scale(1); }
        #headline { font-size: 50px; font-weight: 900; margin: 0; color: #fff; line-height: 1.2; }

        /* Bottom Ticker */
        footer { position: absolute; bottom: 0; width: 100%; height: 70px; background: #000; display: flex; align-items: center; border-top: 4px solid var(--primary); z-index: 20; }
        .breaking-tag { background: var(--primary); height: 100%; display: flex; align-items: center; padding: 0 35px; font-weight: 900; font-size: 24px; text-transform: uppercase; color: #fff; font-style: italic; }
        marquee { font-size: 25px; font-weight: bold; flex: 1; color: #eee; }

        #btn-close { position: fixed; top: 20px; right: 20px; z-index: 6000; background: rgba(255,0,0,0.5); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

<div id="ui">
    <div class="setup-card">
        <h1 style="text-align:center; color: #00f2ff; margin-bottom: 20px;">NEWS STUDIO PRO v5</h1>
        <label>খবর লিখুন (খবর | ইমেজের লিঙ্ক):</label>
        <textarea id="newsInput" placeholder="ঢাকা এখন তপ্ত শহর | https://example.com/image.jpg&#10;খেলাধুলা আপডেট | https://example.com/sports.jpg"></textarea>
        
        <div class="controls">
            <div>
                <label>নিউজ ক্যাটাগরি (কালার):</label>
                <select id="themeColor" onchange="updateThemePreview()">
                    <option value="#ff0000">ব্রেকিং নিউজ (লাল)</option>
                    <option value="#0066ff">ইন্টারন্যাশনাল (নীল)</option>
                    <option value="#00aa00">খেলাধুলা (সবুজ)</option>
                    <option value="#ffaa00">বিনোদন (কমলা)</option>
                </select>
            </div>
            <div>
                <label>পড়ার গতি (Voice Speed):</label>
                <input type="range" id="voiceSpeed" min="0.5" max="1.5" step="0.1" value="0.9">
            </div>
        </div>
        <button class="start-btn" onclick="startCountdown()">লাইভ শুরু করুন 🔴</button>
    </div>
</div>

<div id="countdown"></div>
<button id="btn-close" onclick="exitStudio()">✕</button>

<div id="studio">
    <header>
        <div class="logo-box">
            <h1 id="logoName"> YOUTUBE: BD SHOTTO SHONGBAD</h1>
        </div>
        <div id="clock-box">
            <div id="live-clock" style="font-size: 24px; font-weight: bold;">00:00:00</div>
            <div id="live-date" style="font-size: 14px; color: #aaa;">১৬ এপ্রিল ২০২৬</div>
        </div>
    </header>

    <div id="display-area">
        <div id="news-image-container">
            <img id="news-pic" src="" alt="News Image">
        </div>
        <div id="news-card">
            <h1 id="headline">সংবাদ লোড হচ্ছে...</h1>
        </div>
    </div>

    <footer>
        <div class="breaking-tag" id="tagText">ব্রেকিং</div>
        <marquee id="ticker" scrollamount="10"></marquee>
    </footer>
</div>

<script>
    let newsData = [];
    let currentIdx = 0;
    let isLive = false;
    const synth = window.speechSynthesis;

    // Clock
    function updateClock() {
        const d = new Date();
        document.getElementById('live-clock').innerText = d.toLocaleTimeString('en-US', { hour12: false });
        document.getElementById('live-date').innerText = d.toLocaleDateString('bn-BD', { day: 'numeric', month: 'long', year: 'numeric' });
    }
    setInterval(updateClock, 1000);

    function updateThemePreview() {
        const color = document.getElementById('themeColor').value;
        document.documentElement.style.setProperty('--primary', color);
    }

    function startCountdown() {
        const text = document.getElementById('newsInput').value.trim();
        if(!text) return alert("দয়া করে কিছু খবর ইনপুট দিন!");

        newsData = text.split('\n').map(line => {
            const [msg, img] = line.split('|');
            return { msg: msg?.trim(), img: img?.trim() };
        });

        // ক্যাটাগরি টেক্সট আপডেট
        const sel = document.getElementById('themeColor');
        document.getElementById('tagText').innerText = sel.options[sel.selectedIndex].text.split(' ')[0];

        document.getElementById('ui').classList.add('hide-ui');
        const countDiv = document.getElementById('countdown');
        countDiv.style.display = 'flex';
        
        let timeLeft = 3;
        countDiv.innerText = timeLeft;
        
        const timer = setInterval(() => {
            timeLeft--;
            if(timeLeft <= 0) {
                clearInterval(timer);
                countDiv.style.display = 'none';
                startBroadcasting();
            }
            countDiv.innerText = timeLeft;
        }, 1000);
    }

    function startBroadcasting() {
        isLive = true;
        currentIdx = 0;
        document.getElementById('ticker').innerText = newsData.map(n => n.msg).join("  ✦  ");
        showNews();
    }

    function exitStudio() {
        isLive = false;
        synth.cancel();
        document.getElementById('ui').classList.remove('hide-ui');
        document.getElementById('news-card').classList.remove('active');
        document.getElementById('news-image-container').classList.remove('show');
    }

    function showNews() {
        if(!isLive) return;
        if(currentIdx >= newsData.length) currentIdx = 0;

        const item = newsData[currentIdx];
        const card = document.getElementById('news-card');
        const imgCont = document.getElementById('news-image-container');
        const imgTag = document.getElementById('news-pic');

        // Reset animations
        card.classList.remove('active');
        imgCont.classList.remove('show');

        setTimeout(() => {
            document.getElementById('headline').innerText = item.msg;
            
            if(item.img && item.img.startsWith('http')) {
                imgTag.src = item.img;
                imgCont.classList.add('show');
            }

            card.classList.add('active');

            // Speech
            const speech = new SpeechSynthesisUtterance(item.msg);
            speech.lang = 'bn-BD';
            speech.rate = parseFloat(document.getElementById('voiceSpeed').value);
            
            speech.onend = () => {
                if(isLive) {
                    setTimeout(() => {
                        currentIdx++;
                        showNews();
                    }, 2000);
                }
            };
            synth.speak(speech);

        }, 800);
    }
</script>

</body>
</html>
